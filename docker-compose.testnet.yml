version: "3.9"

services:
  seed-node:
    build: .
    container_name: selfcoin-seed
    command:
      - --testnet
      - --node-id
      - "0"
      - --db
      - /data/seed
      - --port
      - "28444"
      - --log-json
    ports:
      - "28444:28444"
    volumes:
      - selfcoin_seed_data:/data
    restart: unless-stopped

  lightserver:
    build: .
    container_name: selfcoin-lightserver
    entrypoint: ["/src/build/selfcoin-lightserver"]
    command:
      - --testnet
      - --db
      - /data/seed
      - --bind
      - 0.0.0.0
      - --port
      - "29444"
      - --relay-host
      - seed-node
      - --relay-port
      - "28444"
    depends_on:
      - seed-node
    ports:
      - "29444:29444"
    volumes:
      - selfcoin_seed_data:/data
    restart: unless-stopped

volumes:
  selfcoin_seed_data:

